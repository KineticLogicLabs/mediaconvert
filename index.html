<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaConvert - Universal Media Transformer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    
    <style>
        .expandable-section {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .hidden-zero-height {
            max-height: 0;
            opacity: 0;
            margin: 0 !important;
            padding: 0 !important;
            pointer-events: none;
        }
        .visible-height {
            max-height: 1000px;
            opacity: 1;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col overflow-x-hidden">

    <nav class="w-full px-6 sm:px-12 py-8 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 sm:w-16 sm:h-16 flex items-center justify-center bg-indigo-600 rounded-2xl text-white">
                <i class="fas fa-microchip text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl sm:text-3xl font-black text-slate-900 leading-none tracking-tight">MediaConvert</h1>
                <p class="text-[10px] text-indigo-600 font-extrabold uppercase mt-1">Kinetic Logic Labs</p>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col w-full max-w-5xl mx-auto px-6 py-4 gap-8">
        <div class="space-y-2">
            <h2 class="text-3xl md:text-5xl font-black text-slate-900 tracking-tight">Cloud-Powered <span class="text-indigo-600">Engine.</span></h2>
            <p class="text-slate-500 font-medium">High-speed conversion via Hugging Face Hub.</p>
        </div>

        <section id="dropZone" class="relative group rounded-[2.5rem] p-12 md:p-20 text-center cursor-pointer transition-all border-2 border-dashed border-slate-200 bg-white hover:border-indigo-400">
            <input type="file" id="fileInput" class="hidden" multiple>
            <div class="flex flex-col items-center pointer-events-none">
                <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mb-6"><i class="fas fa-upload text-2xl"></i></div>
                <h3 class="text-2xl font-black text-slate-900">Upload your media</h3>
                <p class="text-sm text-slate-400 mb-8 font-medium">Server-side processing for complex tasks.</p>
                <button id="selectFilesBtn" class="pointer-events-auto bg-slate-900 text-white px-10 py-4 rounded-2xl font-black text-xs uppercase hover:bg-indigo-600 transition-all shadow-xl">Choose Files</button>
            </div>
        </section>

        <section id="queueContainer" class="expandable-section hidden-zero-height space-y-6">
            <div class="flex items-center justify-between border-b border-slate-200 pb-4">
                <div class="flex items-center gap-3">
                    <h3 class="font-black text-slate-900 uppercase text-[10px] tracking-widest">Queue</h3>
                    <span id="queueBadge" class="bg-indigo-600 text-white text-[10px] px-2 py-0.5 rounded-md font-black">0</span>
                </div>
                <div class="flex gap-4">
                    <button id="convertAllBtn" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-indigo-700 transition-all">Process All</button>
                    <button id="clearBtn" class="text-slate-400 hover:text-red-500 text-[10px] font-black uppercase transition-colors">Clear</button>
                </div>
            </div>
            <div id="fileList" class="grid grid-cols-1 gap-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar"></div>
        </section>

        <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <button onclick="showFormatDetails('IMAGE')" class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center hover:border-indigo-500 transition-all">
                <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-image"></i></div>
                <h4 class="font-black text-slate-900 text-[10px] uppercase">Images</h4>
            </button>
            <button onclick="showFormatDetails('VIDEO')" class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center hover:border-indigo-500 transition-all">
                <div class="w-12 h-12 bg-rose-50 text-rose-500 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-video"></i></div>
                <h4 class="font-black text-slate-900 text-[10px] uppercase">Videos</h4>
            </button>
            <button onclick="showFormatDetails('AUDIO')" class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center hover:border-indigo-500 transition-all">
                <div class="w-12 h-12 bg-purple-50 text-purple-500 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-music"></i></div>
                <h4 class="font-black text-slate-900 text-[10px] uppercase">Audio</h4>
            </button>
            <button onclick="showFormatDetails('DATA')" class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center hover:border-indigo-500 transition-all">
                <div class="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-file-code"></i></div>
                <h4 class="font-black text-slate-900 text-[10px] uppercase">Data</h4>
            </button>
        </section>

        <div id="formatDetailPanel" class="expandable-section hidden-zero-height bg-white border border-slate-200 rounded-3xl p-8 shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h3 id="detailTitle" class="font-black text-slate-900 uppercase tracking-widest text-xs">Formats</h3>
                <button onclick="hideFormatDetails()" class="text-slate-300 hover:text-slate-900"><i class="fas fa-times"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-8">
                <div>
                    <h5 class="text-[9px] font-black text-slate-400 uppercase mb-4">Input</h5>
                    <div id="inputFormats" class="flex flex-wrap gap-2"></div>
                </div>
                <div>
                    <h5 class="text-[9px] font-black text-slate-400 uppercase mb-4">Output</h5>
                    <div id="outputFormats" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-8 bg-white border-t border-slate-200 px-12">
        <div class="max-w-5xl mx-auto flex justify-between items-center text-[10px] font-black text-slate-400 uppercase tracking-widest">
            <p>&copy; 2026 Kinetic Logic Labs</p>
            <div class="flex gap-4">
                <a href="#" class="hover:text-indigo-600">GitHub</a>
                <span>V2.1.0</span>
            </div>
        </div>
    </footer>

    <canvas id="conversionCanvas" class="hidden"></canvas>
    <script type="module" src="script.js"></script>
</body>
</html>
